<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.png" />
    <meta name="title" content="Vantage" />
    <!-- Primary Meta Tags -->
    <title>Vantage</title>
    <meta name="title" content="Vantage" />
    <meta
      name="description"
      content="Vantage explores innovative web-based approaches in service of journalism."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vantage.krisenstab.net/" />
    <meta property="og:title" content="Vantage" />
    <meta
      property="og:description"
      content="Vantage explores innovative web-based approaches in service of journalism."
    />
    <meta
      property="og:image"
      content="https://vantage.krisenstab.net/cover.jpg"
    />

    <!-- X (Twitter) -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://vantage.krisenstab.net/" />
    <meta property="twitter:title" content="Vantage" />
    <meta
      property="twitter:description"
      content="Vantage explores innovative web-based approaches in service of journalism."
    />
    <meta
      property="twitter:image"
      content="https://vantage.krisenstab.net/cover.jpg"
    />

    <!-- Meta Tags Generated with https://metatags.io -->
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
